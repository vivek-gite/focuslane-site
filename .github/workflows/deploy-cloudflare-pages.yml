name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'focuslane' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build Cloudflare Pages artifact
        run: npm run build:pages

      - name: Stage Cloudflare Pages deploy folder
        run: |
          rm -rf /tmp/focuslane-pages-deploy
          mkdir -p /tmp/focuslane-pages-deploy/public
          cp -R dist/client/. /tmp/focuslane-pages-deploy/public/
          cat > /tmp/focuslane-pages-deploy/wrangler.toml <<'EOF'
          name = "focuslane"
          pages_build_output_dir = "public"
          compatibility_date = "2026-06-12"
          compatibility_flags = ["nodejs_compat"]
          EOF

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: 4.92.0
          workingDirectory: /tmp/focuslane-pages-deploy
          command: pages deploy public --project-name=${{ env.CLOUDFLARE_PAGES_PROJECT_NAME }} --branch=${{ github.ref_name }} --commit-dirty=true
